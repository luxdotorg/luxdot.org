<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LuxDot</title>

<style>
  :root {
    --energy: 0;
    --shakeX: 0px;
    --shakeY: 0px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: #000;
    cursor: default;
    font-family: Arial, Helvetica, sans-serif;
  }

  .scene {
    position: fixed;
    inset: 0;
    overflow: hidden;
    background: radial-gradient(circle at center, #101010 0%, #000 58%);
  }

  .symbol-layer {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
  }

  .symbol {
    position: absolute;
    color: white;
    opacity: 0;
    font-size: var(--size);
    transform: translate(-50%, -50%) scale(0.7);
    text-shadow:
      0 0 8px rgba(255,255,255,0.9),
      0 0 22px rgba(255,255,255,0.75),
      0 0 55px rgba(255,255,255,0.45);
    transition: opacity 0.45s ease, transform 0.45s ease, filter 0.45s ease;
    filter: blur(3px);
    user-select: none;
    white-space: nowrap;
  }

  .symbol.visible {
    opacity: var(--symbolOpacity);
    transform: translate(-50%, -50%) scale(1);
    filter: blur(0);
  }

  .light-aura {
    position: fixed;
    width: 260px;
    height: 260px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 3;
    background: radial-gradient(
      circle,
      rgba(255,255,255,0.22) 0%,
      rgba(255,255,255,0.11) 18%,
      rgba(255,255,255,0.045) 38%,
      transparent 70%
    );
    filter: blur(18px);
    transform: translate(-50%, -50%);
    mix-blend-mode: screen;
  }

  .static-noise {
    position: absolute;
    inset: 0;
    z-index: 4;
    pointer-events: none;
    opacity: calc(var(--energy) * 0.32);
    mix-blend-mode: screen;
    background:
      repeating-radial-gradient(circle, rgba(255,255,255,0.14) 0 1px, transparent 1px 3px),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.06) 0 1px, transparent 1px 5px);
    animation: staticMove 0.12s infinite steps(2);
  }

  @keyframes staticMove {
    0% { transform: translate(0, 0); }
    50% { transform: translate(1%, -1%); }
    100% { transform: translate(-1%, 1%); }
  }

  .scanlines {
    position: absolute;
    inset: 0;
    z-index: 4;
    pointer-events: none;
    opacity: 0.14;
    background: repeating-linear-gradient(
      0deg,
      rgba(255,255,255,0.06) 0px,
      rgba(255,255,255,0.06) 1px,
      transparent 2px,
      transparent 5px
    );
  }

  .content {
    position: absolute;
    inset: 0;
    z-index: 6;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: white;
    pointer-events: none;
    transform: translate(var(--shakeX), var(--shakeY));
    filter:
      blur(calc(var(--energy) * 4px))
      brightness(calc(1 - var(--energy) * 0.25));
    opacity: calc(1 - var(--energy) * 0.35);
  }

  .content-inner {
    padding: 26px;
    text-shadow:
      0 0 12px rgba(255,255,255,0.8),
      0 0 36px rgba(255,255,255,0.35),
      calc(var(--energy) * 10px) 0 rgba(255,255,255,0.25),
      calc(var(--energy) * -10px) 0 rgba(255,255,255,0.2);
  }

  h1 {
    margin: 0;
    font-size: clamp(46px, 8vw, 118px);
    letter-spacing: 0.06em;
    font-weight: 700;
  }

  .subtitle {
    margin-top: 18px;
    font-size: clamp(16px, 2.1vw, 31px);
    letter-spacing: 0.06em;
    font-weight: 300;
  }

  .status {
    margin-top: 34px;
    font-size: clamp(14px, 1.4vw, 20px);
    letter-spacing: 0.13em;
    opacity: 0.82;
  }

  .light-dot {
    position: fixed;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: #fff;
    pointer-events: none;
    z-index: 10;
    box-shadow:
      0 0 8px #fff,
      0 0 18px #fff,
      0 0 40px #fff,
      0 0 90px rgba(255,255,255,0.9),
      0 0 150px rgba(255,255,255,0.45);
  }

  .hint {
    position: fixed;
    bottom: 18px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 11px;
    letter-spacing: 0.18em;
    opacity: 0.35;
    z-index: 20;
  }
</style>
</head>

<body>
  <div class="scene">
    <div class="symbol-layer" id="symbolLayer"></div>
    <div class="light-aura" id="aura"></div>
    <div class="static-noise"></div>
    <div class="scanlines"></div>

    <main class="content">
      <div class="content-inner">
        <h1>LuxDot</h1>
        <div class="subtitle">The First Point of Light .. Where Understanding Begins</div>
        <div class="status">Our website is under construction.</div>
      </div>
    </main>
  </div>

  <div class="light-dot" id="dot"></div>
  <div class="hint">click once to awaken sound · move the mouse</div>

<script>
  const root = document.documentElement;
  const dot = document.getElementById("dot");
  const aura = document.getElementById("aura");
  const symbolLayer = document.getElementById("symbolLayer");

  const symbols = [
    "Signal", "Noise", "Clarity", "Precision", "Meaning", "Understanding",
    "Light", "Point", "Focus", "Depth", "Essence", "Pattern", "Truth",
    "Question", "Insight", "Awareness", "Language", "Logos", "Mind",
    "Order", "Less noise", "More signal", "Reduce noise", "Increase signal",
    "The First Point", "Where Understanding Begins", "LuxDotation",

    "نور", "عقل", "وعي", "معنى", "لغة", "نقطة", "دقة", "صفاء",
    "فهم", "حقيقة", "إشارة", "ضجيج", "بصيرة", "سؤال", "منطق", "نظام",

    "אור", "דעת", "חכמה", "אמת", "סוד", "אין", "נקודה", "שפה",

    "λόγος", "ἀλήθεια", "gnōthi seauton", "Ego", "Id", "Superego",
    "Observer", "The map is not the territory", "As above, so below",

    "E=mc²", "F=ma", "ΔS ≥ 0", "∇·E=ρ/ε₀", "∇·B=0",
    "iℏ∂ψ/∂t=Hψ", "a²+b²=c²", "φ=(1+√5)/2",
    "e^{iπ}+1=0", "PV=nRT", "S=k ln Ω",
    "∑", "∫", "∂", "√", "∞", "π", "λ", "Ω", "Δ", "Σ", "ψ", "θ", "μ", "α", "β",

    "H₂O", "CO₂", "O₂", "NH₃", "CH₄", "C₆H₁₂O₆", "NaCl",
    "C₈H₁₀N₄O₂", "C₉H₁₃NO₃", "DNA", "RNA", "C₂H₅OH",

    "AI", "LLM", "Neural Net", "Token", "Pattern Recognition",
    "Learning", "Reasoning", "Adaptation", "Attention", "Emergence",

    "☉", "☽", "☿", "♀", "♂", "♃", "♄", "☄", "✦", "✧", "⊙",
    "𓂀", "𓋹", "☯", "☸", "ॐ", "⟁", "⟡", "⌬", "⧫", "∴", "∵"
  ];

  const symbolElements = [];
  const symbolCount = 180;

  function createSymbols() {
    symbolLayer.innerHTML = "";
    symbolElements.length = 0;

    for (let i = 0; i < symbolCount; i++) {
      const el = document.createElement("div");
      el.className = "symbol";
      el.textContent = symbols[Math.floor(Math.random() * symbols.length)];

      const x = Math.random() * innerWidth;
      const y = Math.random() * innerHeight;
      const size = 8 + Math.random() * 18;

      el.style.left = x + "px";
      el.style.top = y + "px";
      el.style.setProperty("--size", size + "px");
      el.style.setProperty("--symbolOpacity", 0.45 + Math.random() * 0.55);

      symbolLayer.appendChild(el);
      symbolElements.push({ el, x, y });
    }
  }

  createSymbols();

  let mouseX = innerWidth / 2;
  let mouseY = innerHeight / 2;
  let lastX = mouseX;
  let lastY = mouseY;

  let dotX = mouseX + 120;
  let dotY = mouseY - 80;

  let energy = 0;
  let longMovement = 0;

  let audioStarted = false;
  let audioContext;
  let masterGain;
  let heartbeatTimer = null;
  let currentInterval = 900;

  function startHeartbeatSound() {
    if (audioStarted) return;

    audioContext = new AudioContext();
    masterGain = audioContext.createGain();
    masterGain.gain.value = 0.18;
    masterGain.connect(audioContext.destination);

    audioStarted = true;
    scheduleHeartbeat();
  }

  function playHeartbeat() {
    if (!audioStarted || !audioContext) return;

    const now = audioContext.currentTime;

    playThump(now, 70, 0.55);
    playThump(now + 0.16, 55, 0.38);
  }

  function playThump(time, frequency, strength) {
    const osc = audioContext.createOscillator();
    const gain = audioContext.createGain();
    const filter = audioContext.createBiquadFilter();

    osc.type = "sine";
    osc.frequency.setValueAtTime(frequency, time);
    osc.frequency.exponentialRampToValueAtTime(frequency * 0.55, time + 0.16);

    filter.type = "lowpass";
    filter.frequency.setValueAtTime(140, time);

    gain.gain.setValueAtTime(0.0001, time);
    gain.gain.exponentialRampToValueAtTime(strength, time + 0.025);
    gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.22);

    osc.connect(filter);
    filter.connect(gain);
    gain.connect(masterGain);

    osc.start(time);
    osc.stop(time + 0.24);
  }

  function scheduleHeartbeat() {
    if (!audioStarted) return;

    playHeartbeat();

    heartbeatTimer = setTimeout(scheduleHeartbeat, currentInterval);
  }

  document.body.addEventListener("click", startHeartbeatSound);
  document.body.addEventListener("touchstart", startHeartbeatSound);

  document.addEventListener("mousemove", (e) => {
    const dx = e.clientX - lastX;
    const dy = e.clientY - lastY;
    const speed = Math.sqrt(dx * dx + dy * dy);

    mouseX = e.clientX;
    mouseY = e.clientY;

    energy = Math.min(1, energy + speed / 330);
    longMovement = Math.min(1, longMovement + speed / 1000);

    const distX = dotX - mouseX;
    const distY = dotY - mouseY;
    const dist = Math.sqrt(distX * distX + distY * distY);

    if (dist < 150) {
      const angle = Math.atan2(distY, distX) + (Math.random() - 0.5) * 2.4;
      const power = 80 + Math.random() * 160;

      dotX += Math.cos(angle) * power;
      dotY += Math.sin(angle) * power;
    }

    lastX = e.clientX;
    lastY = e.clientY;
  });

  function revealSymbols(finalEnergy) {
    const revealRadius = 190 + finalEnergy * 90;

    for (const item of symbolElements) {
      const dx = item.x - dotX;
      const dy = item.y - dotY;
      const distance = Math.sqrt(dx * dx + dy * dy);

      if (distance < revealRadius) {
        const strength = 1 - distance / revealRadius;
        item.el.classList.add("visible");
        item.el.style.opacity = Math.min(1, strength * 1.2);
        item.el.style.textShadow = `
          0 0 ${8 + strength * 18}px rgba(255,255,255,1),
          0 0 ${26 + strength * 60}px rgba(255,255,255,0.75)
        `;
      } else {
        item.el.classList.remove("visible");
        item.el.style.opacity = 0;
      }
    }
  }

  function animate() {
    energy *= 0.945;
    longMovement *= 0.985;

    const finalEnergy = Math.min(1, energy + longMovement * 0.55);
    const shake = finalEnergy * 22;

    root.style.setProperty("--energy", finalEnergy);
    root.style.setProperty("--shakeX", `${(Math.random() - 0.5) * shake}px`);
    root.style.setProperty("--shakeY", `${(Math.random() - 0.5) * shake}px`);

    const orbitX = Math.cos(Date.now() * 0.0014) * 85;
    const orbitY = Math.sin(Date.now() * 0.0019) * 55;

    const chaosX = (Math.random() - 0.5) * finalEnergy * 170;
    const chaosY = (Math.random() - 0.5) * finalEnergy * 170;

    dotX += (mouseX + orbitX + chaosX - dotX) * 0.024;
    dotY += (mouseY + orbitY + chaosY - dotY) * 0.024;

    dotX = Math.max(12, Math.min(innerWidth - 12, dotX));
    dotY = Math.max(12, Math.min(innerHeight - 12, dotY));

    dot.style.left = dotX + "px";
    dot.style.top = dotY + "px";

    aura.style.left = dotX + "px";
    aura.style.top = dotY + "px";

    revealSymbols(finalEnergy);

    if (audioStarted && masterGain) {
      currentInterval = 1050 - finalEnergy * 620;
      masterGain.gain.value += ((0.12 + finalEnergy * 0.18) - masterGain.gain.value) * 0.04;
    }

    requestAnimationFrame(animate);
  }

  animate();

  window.addEventListener("resize", () => {
    createSymbols();
    mouseX = innerWidth / 2;
    mouseY = innerHeight / 2;
  });
</script>
</body>
</html>
