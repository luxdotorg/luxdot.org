<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LuxDot</title>

<style>
  :root {
    --energy: 0;
    --shakeX: 0px;
    --shakeY: 0px;
    --blur: 0px;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: #000;
    cursor: default;
    font-family: Arial, Helvetica, sans-serif;
  }

  .scene {
    position: fixed;
    inset: 0;
    overflow: hidden;
    background: #000;
  }

  .background {
    position: absolute;
    inset: -3%;
    background-image: url("images/luxdot-bg.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    transform: translate(var(--shakeX), var(--shakeY)) scale(1.04);
    filter:
      blur(calc(var(--energy) * 3.5px))
      brightness(calc(1 - var(--energy) * 0.35))
      contrast(calc(1 + var(--energy) * 1.2));
    opacity: 1;
  }

  .ghost-layer {
    position: absolute;
    inset: -3%;
    background-image: url("images/luxdot-bg.png");
    background-size: cover;
    background-position: center;
    opacity: calc(var(--energy) * 0.35);
    filter: contrast(2) grayscale(1) blur(calc(var(--energy) * 2px));
    mix-blend-mode: screen;
    transform:
      translate(
        calc(var(--shakeX) * -2),
        calc(var(--shakeY) * 2)
      )
      scale(1.08);
  }

  .static-noise {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: calc(var(--energy) * 0.75);
    mix-blend-mode: screen;
    background:
      repeating-radial-gradient(circle, rgba(255,255,255,0.22) 0 1px, transparent 1px 3px),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.08) 0 1px, transparent 1px 5px),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.07) 0 1px, transparent 1px 4px);
    animation: staticMove 0.12s infinite steps(2);
  }

  @keyframes staticMove {
    0% { transform: translate(0, 0); }
    25% { transform: translate(-2%, 1%); }
    50% { transform: translate(1%, -2%); }
    75% { transform: translate(2%, 2%); }
    100% { transform: translate(-1%, -1%); }
  }

  .scanlines {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: calc(0.12 + var(--energy) * 0.2);
    background: repeating-linear-gradient(
      0deg,
      rgba(255,255,255,0.08) 0px,
      rgba(255,255,255,0.08) 1px,
      transparent 2px,
      transparent 5px
    );
    animation: scanMove 5s linear infinite;
  }

  @keyframes scanMove {
    from { transform: translateY(0); }
    to { transform: translateY(20px); }
  }

  .content {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: white;
    transform: translate(
      calc(var(--shakeX) * 0.6),
      calc(var(--shakeY) * 0.6)
    );
    filter: blur(calc(var(--energy) * 3px));
    opacity: calc(1 - var(--energy) * 0.42);
    z-index: 5;
    pointer-events: none;
  }

  .content-inner {
    padding: 24px;
    text-shadow:
      0 0 12px rgba(255,255,255,0.65),
      0 0 35px rgba(255,255,255,0.25);
  }

  h1 {
    margin: 0;
    font-size: clamp(46px, 8vw, 118px);
    letter-spacing: 0.06em;
    font-weight: 700;
  }

  .subtitle {
    margin-top: 18px;
    font-size: clamp(16px, 2.1vw, 31px);
    letter-spacing: 0.06em;
    font-weight: 300;
  }

  .status {
    margin-top: 34px;
    font-size: clamp(14px, 1.4vw, 20px);
    letter-spacing: 0.13em;
    opacity: 0.8;
  }

  .light-dot {
    position: fixed;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: #fff;
    pointer-events: none;
    z-index: 10;
    box-shadow:
      0 0 6px #fff,
      0 0 14px #fff,
      0 0 32px #fff,
      0 0 70px rgba(255,255,255,0.95),
      0 0 120px rgba(255,255,255,0.55);
  }

  .hint {
    position: fixed;
    bottom: 20px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 11px;
    letter-spacing: 0.18em;
    opacity: 0.35;
    z-index: 20;
  }
</style>
</head>

<body>
  <div class="scene">
    <div class="background"></div>
    <div class="ghost-layer"></div>
    <div class="static-noise"></div>
    <div class="scanlines"></div>

    <main class="content">
      <div class="content-inner">
        <h1>LuxDot</h1>
        <div class="subtitle">The First Point of Light .. Where Understanding Begins</div>
        <div class="status">Our website is under construction.</div>
      </div>
    </main>
  </div>

  <div class="light-dot" id="dot"></div>
  <div class="hint">click once to enable sound · move the mouse</div>

<script>
  const root = document.documentElement;
  const dot = document.getElementById("dot");

  let mouseX = innerWidth / 2;
  let mouseY = innerHeight / 2;
  let lastX = mouseX;
  let lastY = mouseY;

  let dotX = mouseX + 120;
  let dotY = mouseY - 80;

  let energy = 0;
  let longMovement = 0;

  let audioStarted = false;
  let audioContext;
  let noiseGain;
  let filter1;
  let filter2;
  let source;

  function startTVStaticSound() {
    if (audioStarted) return;

    audioContext = new AudioContext();

    const bufferSize = audioContext.sampleRate * 2;
    const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
    const data = buffer.getChannelData(0);

    for (let i = 0; i < bufferSize; i++) {
      data[i] = Math.random() * 2 - 1;
    }

    source = audioContext.createBufferSource();
    source.buffer = buffer;
    source.loop = true;

    filter1 = audioContext.createBiquadFilter();
    filter1.type = "highpass";
    filter1.frequency.value = 700;

    filter2 = audioContext.createBiquadFilter();
    filter2.type = "bandpass";
    filter2.frequency.value = 2600;
    filter2.Q.value = 0.9;

    noiseGain = audioContext.createGain();
    noiseGain.gain.value = 0;

    source.connect(filter1);
    filter1.connect(filter2);
    filter2.connect(noiseGain);
    noiseGain.connect(audioContext.destination);

    source.start();
    audioStarted = true;
  }

  document.body.addEventListener("click", startTVStaticSound);
  document.body.addEventListener("touchstart", startTVStaticSound);

  document.addEventListener("mousemove", (e) => {
    const dx = e.clientX - lastX;
    const dy = e.clientY - lastY;
    const speed = Math.sqrt(dx * dx + dy * dy);

    mouseX = e.clientX;
    mouseY = e.clientY;

    energy = Math.min(1, energy + speed / 330);
    longMovement = Math.min(1, longMovement + speed / 950);

    const distX = dotX - mouseX;
    const distY = dotY - mouseY;
    const dist = Math.sqrt(distX * distX + distY * distY);

    if (dist < 150) {
      const escapeAngle = Math.atan2(distY, distX) + (Math.random() - 0.5) * 2.4;
      const escapePower = 80 + Math.random() * 160;

      dotX += Math.cos(escapeAngle) * escapePower;
      dotY += Math.sin(escapeAngle) * escapePower;
    }

    lastX = e.clientX;
    lastY = e.clientY;
  });

  function animate() {
    energy *= 0.945;
    longMovement *= 0.985;

    const finalEnergy = Math.min(1, energy + longMovement * 0.55);
    const shake = finalEnergy * 22;

    root.style.setProperty("--energy", finalEnergy);
    root.style.setProperty("--shakeX", `${(Math.random() - 0.5) * shake}px`);
    root.style.setProperty("--shakeY", `${(Math.random() - 0.5) * shake}px`);

    const orbitX = Math.cos(Date.now() * 0.0014) * 85;
    const orbitY = Math.sin(Date.now() * 0.0019) * 55;

    const chaosX = (Math.random() - 0.5) * finalEnergy * 170;
    const chaosY = (Math.random() - 0.5) * finalEnergy * 170;

    const targetX = mouseX + orbitX + chaosX;
    const targetY = mouseY + orbitY + chaosY;

    dotX += (targetX - dotX) * 0.024;
    dotY += (targetY - dotY) * 0.024;

    dotX = Math.max(12, Math.min(innerWidth - 12, dotX));
    dotY = Math.max(12, Math.min(innerHeight - 12, dotY));

    dot.style.left = dotX + "px";
    dot.style.top = dotY + "px";

    if (audioStarted && noiseGain && filter1 && filter2) {
      const targetVolume = finalEnergy * 0.22;

      noiseGain.gain.value += (targetVolume - noiseGain.gain.value) * 0.06;

      filter1.frequency.value = 500 + finalEnergy * 1400;
      filter2.frequency.value = 1800 + Math.random() * 4200;
      filter2.Q.value = 0.5 + finalEnergy * 2.4;
    }

    requestAnimationFrame(animate);
  }

  animate();

  window.addEventListener("resize", () => {
    mouseX = innerWidth / 2;
    mouseY = innerHeight / 2;
  });
</script>
</body>
</html>
