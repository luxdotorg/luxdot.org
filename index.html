<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>LuxDot — Where Understanding Begins</title>
<style>
:root{
  --green:0,255,102;
  --energy:0;
  --mx:50%;
  --my:50%;
}
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000}
body{font-family:Inter,Arial,Helvetica,sans-serif;color:#fff}
.scene{position:fixed;inset:0;overflow:hidden;background:
  radial-gradient(circle at 50% 50%,rgba(0,30,14,.35),rgba(0,0,0,.9) 54%,#000 82%)}
#matrix{position:absolute;inset:0;width:100%;height:100%;z-index:1;filter:contrast(1.2) brightness(1.05)}
.vignette{position:absolute;inset:0;z-index:2;pointer-events:none;background:
  radial-gradient(circle at center,transparent 0 30%,rgba(0,0,0,.25) 55%,rgba(0,0,0,.92) 100%)}
.scan{position:absolute;inset:0;z-index:3;pointer-events:none;opacity:.08;background:
  repeating-linear-gradient(0deg,rgba(180,255,205,.12) 0 1px,transparent 1px 4px)}
#symbolLayer{position:absolute;inset:0;z-index:4;pointer-events:none}
.symbol{position:absolute;transform:translate(-50%,-50%) scale(.88);opacity:0;color:#e9fff0;
  font:500 var(--s)/1 "Courier New",monospace;white-space:nowrap;filter:blur(2px);
  text-shadow:0 0 6px rgba(var(--green),1),0 0 24px rgba(var(--green),.75),0 0 60px rgba(var(--green),.35);
  transition:opacity .22s ease,transform .22s ease,filter .22s ease}
.symbol.on{filter:none;transform:translate(-50%,-50%) scale(1)}
.aura{position:fixed;width:320px;height:320px;border-radius:50%;z-index:5;pointer-events:none;
  transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(255,255,255,.19),rgba(0,255,102,.08) 28%,transparent 70%);
  filter:blur(16px);mix-blend-mode:screen}
.dot{position:fixed;width:4px;height:4px;border-radius:50%;z-index:8;pointer-events:none;background:#fff;
  box-shadow:0 0 8px #fff,0 0 22px #fff,0 0 60px rgba(0,255,102,1),0 0 150px rgba(0,255,102,.55)}
.content{position:absolute;inset:0;z-index:6;display:grid;place-items:center;text-align:center;pointer-events:none}
.inner{padding:26px;text-shadow:0 0 12px rgba(255,255,255,.95),0 0 45px rgba(255,255,255,.28)}
h1{margin:0;font-size:clamp(52px,8vw,124px);letter-spacing:.055em}
.sub{margin-top:18px;font-size:clamp(14px,2vw,28px);letter-spacing:.07em;font-weight:300}
.status{margin-top:32px;font-size:clamp(11px,1.2vw,16px);letter-spacing:.18em;color:rgba(220,255,230,.78)}
.signal-state{position:fixed;top:20px;left:50%;z-index:9;transform:translateX(-50%);
  font:10px/1.2 "Courier New",monospace;letter-spacing:.2em;color:rgba(180,255,205,.6);opacity:0;transition:opacity .3s}
.signal-state.show{opacity:1}
#gate{position:fixed;inset:0;z-index:100;display:grid;place-items:center;background:
  radial-gradient(circle at center,rgba(0,30,14,.32),rgba(0,0,0,.94) 58%,#000 100%);
  transition:opacity .8s ease,visibility .8s ease}
#gate.hidden{opacity:0;visibility:hidden}
.gate-wrap{text-align:center;padding:30px}
.gate-mark{width:5px;height:5px;margin:0 auto 28px;border-radius:50%;background:#fff;
  box-shadow:0 0 10px #fff,0 0 35px #fff,0 0 100px rgba(0,255,102,.95)}
#enter{appearance:none;border:1px solid rgba(120,255,165,.36);background:rgba(0,10,5,.36);color:#eaffef;
  padding:14px 22px;border-radius:999px;font:11px "Courier New",monospace;letter-spacing:.24em;cursor:pointer;
  box-shadow:0 0 28px rgba(0,255,102,.08);transition:.25s}
#enter:hover,#enter:focus{border-color:rgba(180,255,205,.85);box-shadow:0 0 34px rgba(0,255,102,.22);outline:none}
.audio-toggle{position:fixed;right:18px;bottom:18px;z-index:20;width:38px;height:38px;border-radius:50%;
  border:1px solid rgba(100,255,150,.25);background:rgba(0,10,5,.35);color:rgba(220,255,230,.8);
  cursor:pointer;font-size:14px;display:none;place-items:center}
.audio-toggle.show{display:grid}
@media(max-width:700px){.status{margin-top:26px}.audio-toggle{right:12px;bottom:12px}}
@media(prefers-reduced-motion:reduce){.scan{display:none}}
</style>
</head>
<body>
<div class="scene">
  <canvas id="matrix"></canvas>
  <div class="vignette"></div>
  <div class="scan"></div>
  <div id="symbolLayer"></div>
  <div class="aura" id="aura"></div>
  <div class="content">
    <div class="inner">
      <h1>LuxDot</h1>
      <div class="sub">The First Point of Light · Where Understanding Begins</div>
      <div class="status">Our website is under Luxdotation.</div>
    </div>
  </div>
</div>
<div class="dot" id="dot"></div>
<div class="signal-state" id="signalState">SIGNAL DETECTED</div>

<div id="gate">
  <div class="gate-wrap">
    <div class="gate-mark"></div>
    <button id="enter" type="button">ENTER SIGNAL</button>
  </div>
</div>
<button id="audioToggle" class="audio-toggle" aria-label="Toggle sound">◉</button>

<script>
(() => {
"use strict";

/* ---------- MATRIX ---------- */
const canvas=document.getElementById("matrix"),ctx=canvas.getContext("2d");
let dpr=1,fontSize=16,cols=[],W=0,H=0,last=0;
const glyphs=[..."0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ","ｱ","ｲ","ｳ","ｴ","ｵ","ｶ","ｷ","ｸ","ｹ","ｺ","ｻ","ｼ","ｽ","ｾ","ｿ","ﾀ","ﾁ","ﾂ","ﾃ","ﾄ","ﾅ","ﾆ","ﾇ","ﾈ","ﾉ","ﾊ","ﾋ","ﾌ","ﾍ","ﾎ","ﾏ","ﾐ","ﾑ","ﾒ","ﾓ","ﾔ","ﾕ","ﾖ","ﾗ","ﾘ","ﾙ","ﾚ","ﾛ","ﾜ","ﾝ","+","-","=","∴","∵","•"];
const signals=["LUX","DOT","LOGOS","SIGNAL","CLARITY","MEANING","نور","وعي","فهم","معنى","אור","אמת","λόγος","∞","∑","Δ","Ω","φ","ψ","E=mc²","DNA","AI"];

function resize(){
 dpr=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;
 canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+"px";canvas.style.height=H+"px";
 ctx.setTransform(dpr,0,0,dpr,0,0);fontSize=W<700?14:17;
 const count=Math.ceil(W/fontSize);
 cols=Array.from({length:count},(_,i)=>({x:i*fontSize,y:Math.random()*H,s:.45+Math.random()*1.55,l:10+Math.floor(Math.random()*25),sig:null,cd:50+Math.random()*180}));
}
function rnd(a){return a[Math.floor(Math.random()*a.length)]}
function draw(t){
 const dt=Math.min(40,t-last||16.7);last=t;
 ctx.fillStyle="rgba(0,0,0,.115)";ctx.fillRect(0,0,W,H);
 ctx.textAlign="center";ctx.textBaseline="middle";
 for(const c of cols){
  c.y+=c.s*fontSize*(dt/30);c.cd-=dt/16.7;
  if(c.cd<=0&&Math.random()<.022){c.sig={text:rnd(signals),y:c.y-Math.random()*c.l*fontSize,life:45+Math.random()*55};c.cd=120+Math.random()*240}
  for(let j=0;j<c.l;j++){
    const y=c.y-j*fontSize;if(y<-fontSize||y>H+fontSize)continue;
    const a=Math.max(.035,1-j/c.l),head=j===0;
    ctx.font=`${head?700:500} ${fontSize}px Courier New`;
    ctx.fillStyle=head?`rgba(225,255,235,${Math.min(1,a+.25)})`:`rgba(0,255,102,${a*.68})`;
    ctx.shadowBlur=head?13:5;ctx.shadowColor=head?"rgba(220,255,230,.95)":"rgba(0,255,102,.75)";
    ctx.fillText(rnd(glyphs),c.x,y);
  }
  if(c.sig){
    c.sig.life-=dt/16.7;ctx.font=`700 ${fontSize+1}px Courier New`;ctx.fillStyle="rgba(235,255,240,.94)";
    ctx.shadowBlur=24;ctx.shadowColor="rgba(0,255,102,1)";ctx.fillText(c.sig.text,c.x,c.sig.y);
    if(c.sig.life<=0)c.sig=null;
  }
  if(c.y-c.l*fontSize>H){c.y=-Math.random()*H*.55;c.s=.45+Math.random()*1.55;c.l=10+Math.floor(Math.random()*25)}
 }
 ctx.shadowBlur=0;requestAnimationFrame(draw);
}
resize();requestAnimationFrame(draw);addEventListener("resize",resize);

/* ---------- SYMBOL FIELD ---------- */
const layer=document.getElementById("symbolLayer"),dot=document.getElementById("dot"),aura=document.getElementById("aura"),state=document.getElementById("signalState");
const words=["Signal","Noise","Clarity","Precision","Meaning","Understanding","Light","Point","Focus","Depth","Truth","Question","Insight","Awareness","Language","Logos","Mind","Order","LuxDotation","نور","وعي","معنى","لغة","فهم","حقيقة","إشارة","אור","אמת","λόγος","ἀλήθεια","E=mc²","ΔS≥0","∞","π","φ","ψ","Ω","Δ","Σ","AI","DNA","𓂀","☯","∴","∵"];
let items=[],mx=innerWidth/2,my=innerHeight/2,dx=mx+120,dy=my-80;
function build(){
 layer.innerHTML="";items=[];
 const n=innerWidth<700?90:145;
 for(let i=0;i<n;i++){const e=document.createElement("div");e.className="symbol";e.textContent=rnd(words);
  const x=Math.random()*innerWidth,y=Math.random()*innerHeight;e.style.left=x+"px";e.style.top=y+"px";e.style.setProperty("--s",(8+Math.random()*15)+"px");
  layer.appendChild(e);items.push({e,x,y})}
}
build();addEventListener("resize",build);
addEventListener("mousemove",e=>{mx=e.clientX;my=e.clientY});
addEventListener("touchmove",e=>{if(e.touches[0]){mx=e.touches[0].clientX;my=e.touches[0].clientY}},{passive:true});
let detected=false,detectTimer=0;
function motion(){
 dx+=(mx+Math.cos(performance.now()*.0014)*80-dx)*.028;dy+=(my+Math.sin(performance.now()*.0018)*50-dy)*.028;
 dot.style.left=dx+"px";dot.style.top=dy+"px";aura.style.left=dx+"px";aura.style.top=dy+"px";
 let near=false;
 for(const it of items){const d=Math.hypot(it.x-dx,it.y-dy),r=205;
  if(d<r){const p=1-d/r;it.e.classList.add("on");it.e.style.opacity=Math.min(.95,p*1.2);if(p>.72)near=true}
  else{it.e.classList.remove("on");it.e.style.opacity=0}
 }
 if(near&&!detected){detected=true;state.classList.add("show");clearTimeout(detectTimer);detectTimer=setTimeout(()=>state.classList.remove("show"),900)}
 if(!near)detected=false;
 requestAnimationFrame(motion)
}
motion();

/* ---------- AUDIO ENGINE ---------- */
let ac=null,master=null,noiseGain=null,humGain=null,started=false,muted=false,voiceTimer=null,toneTimer=null,heartbeatTimer=null;
const enter=document.getElementById("enter"),gate=document.getElementById("gate"),toggle=document.getElementById("audioToggle");

function makeNoiseBuffer(ctx){
 const len=ctx.sampleRate*2,b=ctx.createBuffer(1,len,ctx.sampleRate),d=b.getChannelData(0);
 let last=0;
 for(let i=0;i<len;i++){const white=Math.random()*2-1;last=.985*last+.015*white;d[i]=white*.16+last*.84}
 return b;
}
function setupAudio(){
 if(started)return;
 ac=new (window.AudioContext||window.webkitAudioContext)();
 master=ac.createGain();master.gain.value=.38;master.connect(ac.destination);

 // continuous filtered noise
 const noise=ac.createBufferSource();noise.buffer=makeNoiseBuffer(ac);noise.loop=true;
 const nf=ac.createBiquadFilter();nf.type="bandpass";nf.frequency.value=850;nf.Q.value=.38;
 noiseGain=ac.createGain();noiseGain.gain.value=.08;
 noise.connect(nf);nf.connect(noiseGain);noiseGain.connect(master);noise.start();

 // deep hum
 const hum=ac.createOscillator(),hum2=ac.createOscillator();
 hum.type="sine";hum.frequency.value=43;hum2.type="sine";hum2.frequency.value=86.3;
 humGain=ac.createGain();humGain.gain.value=.035;
 hum.connect(humGain);hum2.connect(humGain);humGain.connect(master);hum.start();hum2.start();

 // subtle modulation
 const lfo=ac.createOscillator(),lg=ac.createGain();lfo.frequency.value=.09;lg.gain.value=.02;
 lfo.connect(lg);lg.connect(humGain.gain);lfo.start();

 started=true;toggle.classList.add("show");
 scheduleTone();scheduleVoice();scheduleHeartbeat();
}
function blip(){
 if(!ac||muted)return;
 const now=ac.currentTime,o=ac.createOscillator(),g=ac.createGain(),f=ac.createBiquadFilter();
 o.type=Math.random()<.5?"sine":"triangle";o.frequency.setValueAtTime(120+Math.random()*680,now);o.frequency.exponentialRampToValueAtTime(45+Math.random()*130,now+.35+Math.random()*.5);
 f.type="bandpass";f.frequency.value=600+Math.random()*1500;f.Q.value=2.5;
 g.gain.setValueAtTime(.0001,now);g.gain.exponentialRampToValueAtTime(.035+Math.random()*.035,now+.025);g.gain.exponentialRampToValueAtTime(.0001,now+.5+Math.random()*.55);
 o.connect(f);f.connect(g);g.connect(master);o.start(now);o.stop(now+1.2)
}
function heartbeat(){
 if(!ac||muted)return;
 const now=ac.currentTime;
 [0,.16].forEach((off,i)=>{const o=ac.createOscillator(),g=ac.createGain();o.type="sine";o.frequency.setValueAtTime(i?52:68,now+off);o.frequency.exponentialRampToValueAtTime(i?34:42,now+off+.18);g.gain.setValueAtTime(.0001,now+off);g.gain.exponentialRampToValueAtTime(i?.025:.04,now+off+.02);g.gain.exponentialRampToValueAtTime(.0001,now+off+.22);o.connect(g);g.connect(master);o.start(now+off);o.stop(now+off+.25)})
}
const voiceWords=["LuxDot","Logos","Signal","Clarity","Meaning","Awareness","Understanding","Reduce noise","Increase signal","The first point of light","نور","وعي","معنى","فهم","إشارة","حقيقة"];
function speak(){
 if(muted||!started||!("speechSynthesis" in window))return;
 speechSynthesis.cancel();
 const u=new SpeechSynthesisUtterance(rnd(voiceWords));
 const arabic=/[\u0600-\u06FF]/.test(u.text);
 u.lang=arabic?"ar-SA":"en-US";u.volume=.16+Math.random()*.12;u.rate=.58+Math.random()*.22;u.pitch=.55+Math.random()*.35;
 const voices=speechSynthesis.getVoices();
 const pool=voices.filter(v=>arabic?v.lang.toLowerCase().startsWith("ar"):v.lang.toLowerCase().startsWith("en"));
 if(pool.length)u.voice=rnd(pool);
 speechSynthesis.speak(u)
}
function scheduleTone(){toneTimer=setTimeout(()=>{blip();scheduleTone()},1800+Math.random()*6000)}
function scheduleVoice(){voiceTimer=setTimeout(()=>{speak();scheduleVoice()},6500+Math.random()*14000)}
function scheduleHeartbeat(){heartbeatTimer=setTimeout(()=>{heartbeat();scheduleHeartbeat()},900+Math.random()*420)}
async function start(){
 setupAudio();
 if(ac.state==="suspended")await ac.resume();
 gate.classList.add("hidden");
 setTimeout(speak,1200);
}
enter.addEventListener("click",start);
enter.addEventListener("touchend",e=>{e.preventDefault();start()},{passive:false});
toggle.addEventListener("click",async()=>{
 if(!started)return;
 muted=!muted;
 if(muted){master.gain.setTargetAtTime(0,ac.currentTime,.05);speechSynthesis.cancel();toggle.textContent="○"}
 else{if(ac.state==="suspended")await ac.resume();master.gain.setTargetAtTime(.38,ac.currentTime,.05);toggle.textContent="◉"}
});
document.addEventListener("visibilitychange",()=>{if(ac&&document.hidden)ac.suspend();else if(ac&&!muted)ac.resume()});
})();
</script>
</body>
</html>
